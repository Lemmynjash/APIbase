# APIbase.pro — Canonical Nginx Configuration (§12.239)
# NOTE: TLS terminated by host Nginx. This container serves HTTP only.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # --- Security (§12.239) ---
    server_tokens off;

    # --- Logging (JSON structured) ---
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_id":"$request_id",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';
    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    # --- Rate Limiting (§12.218) ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=oauth_limit:10m rate=5r/s;

    # --- Upstream ---
    upstream api_backend {
        server api:3000;
    }

    # --- Request ID (§12.108) ---
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # --- Homepage content negotiation ---
    # Agents can request markdown or JSON; browsers default to HTML.
    map $http_accept $homepage_type {
        default           html;
        ~text/markdown    md;
        ~application/json json;
    }

    # --- Stub Status for Exporter (§12.205, port 8080 internal) ---
    server {
        listen 8080;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }

    # --- Main HTTP Server (TLS at host level) ---
    server {
        listen 80;
        server_name apibase.pro;

        # --- Timeouts (§12.179) ---
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;

        # --- Request Size (§12.34) ---
        client_max_body_size 1m;

        # --- Onboard (serves HTML, before API/MCP routes) ---
        location = /onboard {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- x402 discovery markers ---
        # Anonymous probes to /api or /api/v1 get a valid HTTP 402 Payment
        # Required challenge pointing at a real tool. This is a DISCOVERY
        # signal only — real tool-call payments are verified by the
        # x402Middleware + mppMiddleware on /mcp and /api/v1/tools/:id.
        # Exact match (=) ensures /api/v1/tools, /api/v1/agents/*, etc.
        # continue to hit the prefix /api/ block below unchanged.
        location = /api {
            default_type application/json;
            add_header Cache-Control "public, max-age=300" always;
            add_header WWW-Authenticate 'x402 realm="apibase.pro", scheme="exact", network="base"' always;
            add_header X-Payment-Required '1' always;
            add_header X-402-Version '1' always;
            add_header Payment-Required '' always;
            add_header X-PAYMENT 'x402' always;
            add_header Access-Control-Expose-Headers 'WWW-Authenticate, X-Payment-Required, X-402-Version, Payment-Required, X-PAYMENT' always;
            return 402 '{"x402Version":1,"error":"X-PAYMENT header required - APIbase is a pay-per-call API platform","accepts":[{"scheme":"exact","network":"base","maxAmountRequired":"10000","resource":"https://apibase.pro/api/v1/tools/coingecko.get_price","description":"APIbase tool call (example: coingecko.get_price at 0.01 USDC). Full catalog: https://apibase.pro/api/v1/tools","mimeType":"application/json","payTo":"0x50EbDa9dA5dC19c302Ca059d7B9E06e264936480","asset":"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913","maxTimeoutSeconds":300,"extra":{"name":"USDC","version":"2"}}]}';
        }

        location = /api/v1 {
            default_type application/json;
            add_header Cache-Control "public, max-age=300" always;
            add_header WWW-Authenticate 'x402 realm="apibase.pro", scheme="exact", network="base"' always;
            add_header X-Payment-Required '1' always;
            add_header X-402-Version '1' always;
            add_header Payment-Required '' always;
            add_header X-PAYMENT 'x402' always;
            add_header Access-Control-Expose-Headers 'WWW-Authenticate, X-Payment-Required, X-402-Version, Payment-Required, X-PAYMENT' always;
            return 402 '{"x402Version":1,"error":"X-PAYMENT header required - APIbase is a pay-per-call API platform","accepts":[{"scheme":"exact","network":"base","maxAmountRequired":"10000","resource":"https://apibase.pro/api/v1/tools/coingecko.get_price","description":"APIbase tool call (example: coingecko.get_price at 0.01 USDC). Full catalog: https://apibase.pro/api/v1/tools","mimeType":"application/json","payTo":"0x50EbDa9dA5dC19c302Ca059d7B9E06e264936480","asset":"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913","maxTimeoutSeconds":300,"extra":{"name":"USDC","version":"2"}}]}';
        }

        # --- API Routes ---
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- OAuth 2.0 (RFC 6749 + RFC 7591) — tight rate limit, fresh credentials ---
        location /oauth/ {
            limit_req zone=oauth_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- MCP Routes (Streamable HTTP + SSE, no buffering) ---
        location /mcp {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # --- SSE transport (deprecated, backward compat) ---
        location /sse {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        location /messages {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- Static Files (§12.51) ---
        # RFC 9727 API Catalog — linkset+json MIME, overrides the default
        # application/json set by the /.well-known/ prefix block below.
        location = /.well-known/api-catalog {
            root /var/www/static;
            default_type application/linkset+json;
        }

        # UCP (Universal Commerce Protocol) — file has no extension, so we
        # need a specific location to set default_type cleanly without the
        # double-Content-Type issue from the /.well-known/ prefix add_header.
        location = /.well-known/ucp {
            root /var/www/static;
            default_type application/json;
        }

        location /.well-known/ {
            root /var/www/static;
            add_header Content-Type application/json;
        }

        # Sitemap (referenced from robots.txt)
        location = /sitemap.xml {
            root /var/www/static;
            default_type application/xml;
            add_header X-Robots-Tag "noindex, nofollow" always;
        }

        # /openapi.json at root — required by MPPScan/AgentCash discovery
        location = /openapi.json {
            alias /var/www/static/.well-known/openapi.json;
            add_header Content-Type application/json;
        }

        location /robots.txt {
            root /var/www/static;
        }

        location /ai.txt {
            root /var/www/static;
        }

        location /llms.txt {
            root /var/www/static;
        }

        location = /video/ {
            root /var/www/static;
            try_files /video/index.html =404;
            types { text/html html; }
        }

        location /video/ {
            root /var/www/static;
            types { video/mp4 mp4; video/quicktime mov; }
            add_header Cache-Control "public, max-age=86400";
            add_header Accept-Ranges bytes;
        }

        location ~ ^/devto-article.*\.md$ {
            root /var/www/static;
            types { text/plain md; }
            add_header Content-Disposition "inline";
        }

        location = /og-image.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=86400";
        }

        location = /icon.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /logo.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /logo.svg {
            root /var/www/static;
            types { image/svg+xml svg; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /favicon.svg {
            root /var/www/static;
            types { image/svg+xml svg; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /favicon.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /favicon.ico {
            root /var/www/static;
            try_files /favicon.png =404;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /contact {
            root /var/www/static;
            try_files /contact.html =404;
        }

        location = /privacy {
            root /var/www/static;
            try_files /privacy.html =404;
        }

        location = /terms {
            root /var/www/static;
            try_files /terms.html =404;
        }

        location = /dashboard {
            root /var/www/static;
            try_files /dashboard.html =404;
        }
        location = /frameworks {
            root /var/www/static;
            try_files /frameworks.html =404;
        }

        # --- Homepage: content negotiation (HTML / JSON / Markdown) ---
        location = / {
            # RFC 8288 Link headers for agent discovery
            add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"" always;
            add_header Link "</.well-known/openapi.json>; rel=\"service-desc\"; type=\"application/vnd.oai.openapi+json;version=3.1\"" always;
            add_header Link "</.well-known/mcp/server-card.json>; rel=\"service-meta\"; type=\"application/json\"" always;
            add_header Link "</health/ready>; rel=\"status\"" always;
            add_header Vary "Accept" always;

            error_page 418 = @homepage_json;
            error_page 419 = @homepage_markdown;
            if ($homepage_type = json) {
                return 418;
            }
            if ($homepage_type = md) {
                return 419;
            }
            root /var/www/static;
            try_files /index.html =404;
        }

        location @homepage_json {
            default_type application/json;
            return 200 '{"name":"APIbase.pro","description":"The API Hub for AI Agents","version":"1.0.0","docs":"https://apibase.pro/ai.txt","mcp":"https://apibase.pro/mcp","health":"https://apibase.pro/health/ready","tools":"https://apibase.pro/api/v1/tools"}';
        }

        location @homepage_markdown {
            root /var/www/static;
            default_type "text/markdown; charset=utf-8";
            try_files /index.md =404;
        }

        # --- Health (no rate limit) ---
        location /health/ {
            proxy_pass http://api_backend;
        }

        # --- Custom Error Pages (§12.190) ---
        error_page 502 /502.json;
        error_page 503 /503.json;
        error_page 504 /504.json;

        location = /502.json {
            internal;
            default_type application/json;
            return 502 '{"error":"bad_gateway","message":"Backend unavailable"}';
        }

        location = /503.json {
            internal;
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"Service temporarily unavailable"}';
        }

        location = /504.json {
            internal;
            default_type application/json;
            return 504 '{"error":"gateway_timeout","message":"Backend timeout"}';
        }
    }
}
